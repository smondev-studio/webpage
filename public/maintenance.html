<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmonDev Studio — En mantenimiento</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      text-align: center;
      max-width: 420px;
      padding: 3rem 2rem;
    }
    .logo {
      height: 80px;
      width: auto;
      border-radius: 12px;
      margin-bottom: 2rem;
    }
    h1 { font-size: 1.5rem; font-weight: 900; margin-bottom: 0.75rem; }
    p { color: #94a3b8; margin-bottom: 0.5rem; }
    p.small { font-size: 0.875rem; color: #64748b; }
    a { color: #f97316; text-decoration: none; font-weight: 600; }
    a:hover { color: #fb923c; }
  </style>
</head>
<body>
  <div class="card">
    <img src="/images/logo.png" alt="SmonDev Studio" class="logo" />
    <h1>SmonDev Studio</h1>
    <p>Estamos trabajando en el sitio</p>
    <p class="small">
      Volvé en unos minutos. Si el problema persiste,
      <a href="mailto:hola@smondevstudio.com">contactanos</a>.
    </p>
  </div>
</body>
</html>
